name: CI - API

# Read-only checks only — no AWS credentials, no deploy. apps/api is deployed manually via
# `terraform apply` (see infra/README.md), never from CI. This just catches broken backend code
# before it lands on main.
on:
  pull_request:
    paths:
      - "apps/api/**"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Typecheck
        working-directory: apps/api
        run: npm run typecheck

      - name: Test
        working-directory: apps/api
        run: npm run test

      - name: Build (verify the Lambda bundle compiles)
        working-directory: apps/api
        run: npm run build
